# commit-hook 配置文件
# 修改后立即生效，无需重新 init

llm:
  provider: openai           # openai | anthropic | ollama | deepseek | ...
  model: deepseek-v4-flash
  api_base: "https://api.deepseek.com"               # 可选，自定义 API 端点（Ollama/vLLM/企业网关）
  api_key_env: DEEPSEEK_API_KEY # 从环境变量读取，不存明文
  timeout: 10                # 秒

rules:
  min_length: 10             # message 最短字符数
  forbid_patterns:           # 禁止的 message 模式（正则）
    - "^fix$"
    - "^update$"
    - "^WIP$"

diff:
  max_lines: 500             # diff 最大行数，超出截断
  exclude:                   # 排除的文件（glob 匹配）
    - "package-lock.json"
    - "yarn.lock"
    - "*.lock"
    - "*.min.js"
    - "*.map"
    - "*.svg"
    - "*.png"

output:
  color: true                # 终端彩色输出
  verbose: false             # 详细日志
